<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Construction Planner</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="header">
    <h1>🏗 AI Construction Planner</h1>
    <p class="subtitle">Autonomous Multi-Agent Construction Intelligence</p>
  </div>

<!-- theme toggle moved into input area -->
<div class="input-box">
  <input id="goal" placeholder="Enter goal (Build House)">
  <button onclick="runPlanner()">Generate Plan</button>
  <button id="themeBtn" class="theme-toggle" onclick="toggleTheme()">🌗 Dark Mode: Off</button>
</div>

<div class="progress"><div id="progressBar"></div></div>

<div class="thinking" id="thinking">🤖 AI is thinking...</div>

<div class="grid">

  <div class="card"><h3>📥 Goal</h3><p id="goalOut"></p></div>

  <div class="card"><h3>📋 Final Schedule</h3><ul id="schedule"></ul></div>

  <div class="card risk-card">
    <h3>⚠ Risk Analysis</h3>
    <p id="risk"></p>
    <div id="severity" class="severity"></div>
  </div>

  <div class="card gantt-card">
    <h3>📊 Gantt Chart</h3>
    <img id="gantt" style="width:100%; border-radius:10px;">
  </div>

</div>

</div>

<footer class="footer">
  <p></p>
</footer>

<script src="script.js"></script>
</body>
</html>
