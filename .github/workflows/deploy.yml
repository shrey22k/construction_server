name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build backend image
      run: docker build -t backend -f Dockerfile.backend .

    - name: Build frontend image
      run: docker build -t frontend -f Dockerfile.frontend .